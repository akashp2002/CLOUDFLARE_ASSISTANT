version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Mount the data folder rather than baking it into the image -- the
      # embeddings file is large and regeneratable, so it doesn't belong
      # inside a versioned Docker image; it's provided at runtime instead.
      - ./backend/data:/app/data
      # Host's Hugging Face cache, reused instead of re-downloading models
      # inside the container.
      - C:/Users/Asus/.cache/huggingface:/app/model_cache:rw
    depends_on:
      - qdrant
    environment:
      # Overrides QDRANT_HOST inside the container -- "localhost" wouldn't
      # work here since qdrant runs in a separate container, reachable only
      # by its service name on the shared Docker network Compose creates.
      - QDRANT_HOST=qdrant
      - HF_HOME=/app/model_cache
    deploy:
      resources:
        limits:
          # Caps this container's memory so a spike fails predictably/locally
          # instead of triggering a system-wide WSL2 OOM kill. Tune based on
          # your available RAM -- see README for minimum requirements.
          memory: 3G

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    command: ["npm", "run", "preview", "--", "--host", "0.0.0.0", "--port", "5173"]
    depends_on:
      - backend